        .blog-date { color: var(--primary-color); font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; display: block; }
        .blog-title { font-size: 1.5rem; margin-bottom: 15px; }
        .blog-title a { color: var(--text-main); }
