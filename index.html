
<!DOCTYPE html>

    <style>
        /* Interactive Cosmic Hero */
        .hero { position: relative; height: 100vh; min-height: 600px; display: flex; align-items: center; overflow: hidden; background: #000; }
        #cosmic-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.8; }
        .hero-content { position: relative; z-index: 2; max-width: 800px; pointer-events: none; } /* Let mouse pass to canvas */
        .hero-title { font-size: 5rem; line-height: 1; margin-bottom: 20px; text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .hero-title span { color: var(--primary-color); }
        .hero-subtitle { font-size: 1.2rem; color: #fff; margin-bottom: 30px; font-weight: 400; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .hero-btns { display: flex; gap: 15px; pointer-events: auto; }
        
        /* Services Preview (Simplified for index) */
        .services-preview { background: var(--surface-color); text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-truck-fast"></i> Flash Towing</a>
            <div class="nav-links">
                <a href="index.html">Home</a>

            </div>

            </div>
        </div>
    </header>

    <section class="hero">
        <!-- The Interactive Cosmic Flow Canvas -->
        <canvas id="cosmic-canvas"></canvas>
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title">Portland's <span>Fastest</span><br>Towing Service</h1>
                <p class="hero-subtitle">Move your mouse to interact with the cosmic flow. Reliable, professional, and rapid towing & roadside assistance available 24/7.</p>
                <div class="hero-btns">
                    <a href="tel:9713268952" class="btn btn-primary"><i class="fa-solid fa-phone-volume"></i> Call Now</a>
                    <a href="junk-cars.html" class="btn btn-outline"><i class="fa-solid fa-car-burst"></i> Sell Junk Car</a>
                </div>
            </div>

    </section>

    <footer>
        <div class="container">
            <div class="copyright"><p>&copy; 2026 Flash Towing PDX. All Rights Reserved.</p></div>
        </div>
    </footer>

    <script>
        // Interactive "Cosmic Flow" Particle Simulation
        const canvas = document.getElementById('cosmic-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray =[];
        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y;
                this.directionX = directionX; this.directionY = directionY;
                this.size = size; this.color = color;
                this.baseX = this.x; this.baseY = this.y;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * 5;
                let directionY = forceDirectionY * force * 5;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) { let dx = this.x - this.baseX; this.x -= dx/10; }
                    if (this.y !== this.baseY) { let dy = this.y - this.baseY; this.y -= dy/10; }
                }
                this.draw();
            }
        }

        function init() {
            particlesArray =[];
            let numberOfParticles = (canvas.height * canvas.width) / 6000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * .2) - .1;
                let directionY = (Math.random() * .2) - .1;
                let color = Math.random() > 0.5 ? '#ffb300' : '#e8342a'; // Amber and Red cosmic glow
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; // Creates the fluid trail effect
            ctx.fillRect(0, 0, innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
        }

        window.addEventListener('resize', function() {
            canvas.width = innerWidth; canvas.height = innerHeight; init();
        });

        init(); animate();
    </script>
</body>
</html>
